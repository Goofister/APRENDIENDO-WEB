<!DOCTYPE html>
<html lang="es">
<head>
    <title>Texarea</title>
    <link rel="stylesheet" href="estyles.css">
    <link rel="icon" href="logo.png" type="image/png" >
</head>
<body>
    <form>
        <h2>Formulario de contacto</h2>
        
        <div class="form_input">
            <label >Nombre Completo 
                <input type="text" placeholder="Jhon doe">
            </label>
        </div>
        <div class="form_input">
            <label >Correo Electronico  
                <input type="email" placeholder="ejemplo@gmail.com" id="Email">
            </label>
        </div>
        <div class="form_input">
            <label >Nombre  
                <input type="text" placeholder="Pablo" >
            </label>
        </div>
        <div class="form_input">
            <label >Tu comentario  
                <textarea rows="6" maxlength="340" placeholder="Deja tu comentario ..."></textarea>
            </label>
        </div>
        <div class="form_input">
            <label  >Acepto los terminos y servicios 
                <input class="checkbox" type="checkbox" >
            </label>
        </div>
    </form>
</body>
</html>
